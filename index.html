<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ava & Steven 婚禮相簿 - 分享幸福時刻</title>
    <style>
        /* 基本樣式 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        ::-webkit-scrollbar { display: none; }

        /* 載入畫面 */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; transition: opacity 0.8s ease-out;
        }
        .loading-text { font-size: 20px; color: #e66a81; line-height: 1.6; font-weight: bold; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #e66a81; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 主要內容框架 */
        #content-frame {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* 懸浮按鈕 */
        .floating-btn {
            position: fixed; bottom: 30px; right: 20px; z-index: 30;
            background: linear-gradient(145deg, #ff8da1, #e66a81);
            color: white; padding: 12px 20px; border-radius: 50px;
            text-decoration: none; font-size: 14px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .floating-btn:hover { transform: scale(1.05); }

        /* The Iframe */
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        
    </style>
</head>
<body>
        <div id="loading-screen">
        <div class="loader"></div>
        <div class="loading-text">
            馬上進入上載頁面，<br>
            請準備好您的相片！
        </div>
        </div>
    
    <a href="https://drive.google.com/drive/folders/1IxGIQbMiMGqAAGmTa669rDlspjsZ2Iq4?usp=sharing" 
       target="_blank" class="floating-btn">>> 觀看所有相片</a>

    <iframe id="content-frame" src=""></iframe>
    
    <script>
        const appScriptUrl = "https://script.google.com/macros/s/AKfycbxwMIFcxR7hc08esG_LlEILWTnXdrD8q8NlJasAw0K1idV06O9UZLrs7SfYT4Wkk6NokA/exec";
        let fetchCount = 0;
        let currentVersion = "0";
        const PASSWORD = "123"; // <--- 管理員密碼

        function openAdmin() {
            const input = prompt("管理員密碼:");
            if (input === PASSWORD) {
                const stats = `連線統計:\n總讀取次數: ${fetchCount}\n\n按「確定」重設計數，按「取消」關閉。`;
                if (confirm(stats)) {
                    fetchCount = 0;
                    alert("計數已歸零。");
                }
            } else if (input !== null) {
                alert("密碼錯誤！");
            }
        }

        async function trackQuota() {
            try {
                fetchCount++;
                const res = await fetch(`${appScriptUrl}?checkVersion=true`);
                const version = await res.text();
                currentVersion = version;
            } catch (e) {
                console.log("Tracking sync...");
            }
        }

        const iframe = document.getElementById('content-frame');
        iframe.src = appScriptUrl;
        iframe.onload = () => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display='none', 800);
        };

        // Every 30 seconds
        setInterval(trackQuota, 30000);
        trackQuota();
    </script>
</body>
</html>
